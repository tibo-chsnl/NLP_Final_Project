name: Automated Retraining Pipeline

# Runs weekly on Sunday at 02:00 UTC, or manually via workflow_dispatch
on:
  schedule:
    - cron: "0 2 * * 0"  # Every Sunday at 02:00 UTC
  workflow_dispatch:
    inputs:
      sample_ratio:
        description: "Fraction of training data to use (0.0-1.0)"
        required: false
        default: "0.10"
      epochs:
        description: "Number of fine-tuning epochs"
        required: false
        default: "2"
      skip_feedback:
        description: "Skip pulling feedback from Supabase"
        required: false
        default: "false"

jobs:
  pull-feedback:
    name: Pull User Feedback
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_feedback != 'true' }}
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    outputs:
      has_feedback: ${{ steps.pull.outputs.has_feedback }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Pull DVC data
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DAGSHUB_TOKEN }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DAGSHUB_TOKEN }}
        run: uv run dvc pull data/train-v2.0.json

      - name: Pull feedback from Supabase
        id: pull
        run: |
          output=$(uv run python scripts/pull_feedback.py 2>&1) || true
          echo "$output"
          if echo "$output" | grep -q "Added"; then
            echo "has_feedback=true" >> "$GITHUB_OUTPUT"
            echo "✅ New feedback incorporated into training data"
          else
            echo "has_feedback=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No new feedback to process"
          fi

      - name: Push updated data to DVC
        if: steps.pull.outputs.has_feedback == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DAGSHUB_TOKEN }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          uv run dvc add data/train-v2.0.json
          uv run dvc push

      - name: Upload data artifact
        if: steps.pull.outputs.has_feedback == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: updated-dvc-files
          path: |
            data/train-v2.0.json.dvc
            data/.gitignore

  fine-tune:
    name: Fine-Tune Model
    runs-on: ubuntu-latest
    needs: pull-feedback
    # Always run fine-tuning (feedback is a bonus, not a requirement)
    if: ${{ always() && !cancelled() }}
    timeout-minutes: 120
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.DAGSHUB_TOKEN }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.DAGSHUB_TOKEN }}
      DAGSHUB_USER_NAME: ${{ secrets.DAGSHUB_USER_NAME }}
      DAGSHUB_REPO_NAME: ${{ secrets.DAGSHUB_REPO_NAME }}
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Download model checkpoints
        run: uv run python scripts/download_checkpoints.py

      - name: Pull DVC data
        run: uv run dvc pull

      # If feedback job updated data, use the fresh DVC pointer
      - name: Download updated DVC files
        if: needs.pull-feedback.outputs.has_feedback == 'true'
        uses: actions/download-artifact@v4
        with:
          name: updated-dvc-files
          path: data/

      - name: Re-pull data if updated
        if: needs.pull-feedback.outputs.has_feedback == 'true'
        run: uv run dvc pull data/train-v2.0.json

      - name: Run fine-tuning
        run: |
          SAMPLE_RATIO="${{ github.event.inputs.sample_ratio || '0.10' }}"
          EPOCHS="${{ github.event.inputs.epochs || '2' }}"

          echo "🔧 Fine-tuning with sample_ratio=$SAMPLE_RATIO, epochs=$EPOCHS"

          uv run python scripts/fine_tune.py \
            --sample-ratio "$SAMPLE_RATIO" \
            --epochs "$EPOCHS" \
            --batch-size 16 \
            --lr 0.0003

      - name: Push updated checkpoints to DVC
        run: |
          uv run dvc add checkpoints/
          uv run dvc push

      - name: Upload checkpoint artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fine-tuned-checkpoints
          path: |
            checkpoints.dvc
            checkpoints/config.json
            checkpoints/finetune_history.json

  commit-and-promote:
    name: Commit & Trigger Promotion
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [pull-feedback, fine-tune]
    if: ${{ always() && needs.fine-tune.result == 'success' }}
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      MODEL_NAME: ${{ secrets.MODEL_NAME }}
      F1_THRESHOLD: "0.5"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download fine-tuned checkpoint metadata
        uses: actions/download-artifact@v4
        with:
          name: fine-tuned-checkpoints
          path: .

      - name: Download updated DVC files (if any)
        if: needs.pull-feedback.outputs.has_feedback == 'true'
        uses: actions/download-artifact@v4
        with:
          name: updated-dvc-files
          path: data/

      - name: Commit DVC pointer updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add checkpoints.dvc data/*.dvc data/.gitignore 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "ℹ️  No DVC pointer changes to commit"
          else
            git commit -m "ci: update model checkpoints after automated fine-tuning [skip ci]"
            git push
            echo "✅ Committed and pushed updated DVC pointers"
          fi

      - name: Run promotion gate
        run: |
          pip install mlflow
          python scripts/promotion_gate.py || echo "⚠️  Promotion gate did not pass (model may not have improved)"

      - name: Trigger Render deploy
        if: success()
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" && echo "✅ Render deploy triggered"
          else
            echo "ℹ️  No RENDER_DEPLOY_HOOK_URL set — Render will auto-deploy on git push"
          fi
