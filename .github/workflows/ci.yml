name: CI Pipeline

on:
  pull_request:
    branches: [dev, staging, main]
  push:
    branches: [dev]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --dev
      - name: Run Ruff linter
        run: uv run ruff check .
      - name: Run Ruff formatter check
        run: uv run ruff format --check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      # DagsHub S3-compatible credentials for DVC pull
      AWS_ACCESS_KEY_ID: ${{ secrets.DAGSHUB_TOKEN }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.DAGSHUB_TOKEN }}
      DVC_TMP_DIR: /tmp/dvc
      # MLflow / DagsHub tracking
      DAGSHUB_USER_NAME: ${{ secrets.DAGSHUB_USER_NAME }}
      DAGSHUB_REPO_NAME: ${{ secrets.DAGSHUB_REPO_NAME }}
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --dev
      - name: Pull DVC data
        run: uv run dvc pull
      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

