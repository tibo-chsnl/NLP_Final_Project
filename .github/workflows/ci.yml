name: CI Pipeline

# ─────────────────────────────────────────────────────────────
# Runs on every PR targeting dev / staging / main, and on push to dev.
#
# Pipeline (PR → dev):
#   1. Lint (Ruff)
#   2. Unit + Integration tests (pytest)
#   3. Build Docker images (no push) — validates Dockerfiles
#
# Pipeline (PR → staging / main):
#   Same jobs; staging and prod deploy happen in dedicated workflows.
# ─────────────────────────────────────────────────────────────
on:
  pull_request:
    branches: [dev, staging, main]
  push:
    branches: [dev]

jobs:
  # ── 1. Lint ─────────────────────────────────────────────────
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  # ── 2. Unit + Integration tests ─────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.DAGSHUB_TOKEN }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.DAGSHUB_TOKEN }}
      DVC_TMP_DIR: /tmp/dvc
      DAGSHUB_USER_NAME: ${{ secrets.DAGSHUB_USER_NAME }}
      DAGSHUB_REPO_NAME: ${{ secrets.DAGSHUB_REPO_NAME }}
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Pull DVC data
        run: uv run dvc pull

      - name: Run unit & integration tests
        run: uv run pytest tests/ -v --tb=short

  # ── 3. Docker build (no push) ───────────────────────────────
  docker-build:
    name: Docker Build (validate)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: qa-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: qa-frontend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

