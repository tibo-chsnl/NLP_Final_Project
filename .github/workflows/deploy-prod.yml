name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render (Production)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          curl -X POST "https://api.render.com/deploy/srv-${{ secrets.RENDER_PROD_FRONTEND_ID }}?key=${{ secrets.RENDER_API_KEY }}"
          curl -X POST "https://api.render.com/deploy/srv-${{ secrets.RENDER_PROD_BACKEND_ID }}?key=${{ secrets.RENDER_API_KEY }}"
