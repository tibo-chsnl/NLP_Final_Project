name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Frontend to Render (Production)
        run: |
          curl -X POST "https://api.render.com/deploy/${{ secrets.RENDER_PROD_FRONTEND_ID }}?key=${{ secrets.RENDER_API_KEY }}"

      - name: Deploy Backend to Render (Production)
        run: |
          curl -X POST "https://api.render.com/deploy/${{ secrets.RENDER_PROD_BACKEND_ID }}?key=${{ secrets.RENDER_API_KEY }}"
