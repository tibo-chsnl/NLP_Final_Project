name: Deploy to Production

# ─────────────────────────────────────────────────────────────
# Triggered on push to main (after merging staging → main).
#
# Pipeline:
#   1. Model promotion gate (F1 threshold)
#   2. Deploy to production via Render
#
# The promotion gate MUST pass for production to be updated.
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]

jobs:
  # ── 1. Promotion gate ───────────────────────────────────────
  promotion-gate:
    name: Model Promotion Gate
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      MODEL_NAME: ${{ secrets.MODEL_NAME }}
      F1_THRESHOLD: "0.5"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MLflow
        run: pip install mlflow

      - name: Run promotion gate
        run: python scripts/promotion_gate.py

  # ── 2. Deploy code & model to production ────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: promotion-gate
    steps:
      - name: Trigger Render production deploy
        run: |
          if [ -n "${{ secrets.RENDER_PROD_DEPLOY_HOOK }}" ]; then
            curl -s "${{ secrets.RENDER_PROD_DEPLOY_HOOK }}" && echo "✅ Render production deploy triggered"
          else
            echo "ℹ️  No RENDER_PROD_DEPLOY_HOOK set — Render will auto-deploy from main branch"
          fi
