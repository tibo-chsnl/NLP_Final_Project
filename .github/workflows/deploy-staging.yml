name: Deploy to Staging

on:
  push:
    branches: [staging]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render (Staging)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          curl -X POST "https://api.render.com/deploy/srv-${{ secrets.RENDER_STAGING_FRONTEND_ID }}?key=${{ secrets.RENDER_API_KEY }}"
          curl -X POST "https://api.render.com/deploy/srv-${{ secrets.RENDER_STAGING_BACKEND_ID }}?key=${{ secrets.RENDER_API_KEY }}"
