name: Deploy to Staging

on:
  push:
    branches: [staging]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Frontend to Render (Staging)
        run: |
          curl -X POST "https://api.render.com/deploy/${{ secrets.RENDER_STAGING_FRONTEND_ID }}?key=${{ secrets.RENDER_API_KEY }}"

      - name: Deploy Backend to Render (Staging)
        run: |
          curl -X POST "https://api.render.com/deploy/${{ secrets.RENDER_STAGING_BACKEND_ID }}?key=${{ secrets.RENDER_API_KEY }}"
