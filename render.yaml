services:
  - type: web
    name: qa-frontend-staging
    env: node
    buildCommand: cd frontend && npm ci && npm run build
    startCommand: cd frontend && node .next/standalone/server.js
    envVars:
      - key: BACKEND_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: NODE_ENV
        value: production

  - type: web
    name: qa-backend-staging
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MLFLOW_TRACKING_URI
        sync: false
      - key: MODEL_NAME
        sync: false

  - type: web
    name: qa-frontend-prod
    env: node
    buildCommand: cd frontend && npm ci && npm run build
    startCommand: cd frontend && node .next/standalone/server.js
    envVars:
      - key: BACKEND_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: NODE_ENV
        value: production

  - type: web
    name: qa-backend-prod
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MLFLOW_TRACKING_URI
        sync: false
      - key: MODEL_NAME
        sync: false
