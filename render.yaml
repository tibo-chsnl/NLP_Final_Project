# Render Blueprint — Infrastructure as Code
# Defines all 4 web services for staging and production.
# Deploy via: Render Dashboard → New → Blueprint → Select this repo

services:
  # ===========================
  # STAGING ENVIRONMENT
  # ===========================
  - type: web
    name: qa-backend-staging
    runtime: python
    region: frankfurt
    plan: free
    branch: staging
    buildCommand: pip install uv && uv sync && uv run python scripts/download_checkpoints.py
    startCommand: uv run uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: staging
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: USE_MLFLOW
        value: "true"
      - key: MLFLOW_MODEL_NAME
        value: QA_Model
      - key: MLFLOW_MODEL_ALIAS
        value: staging
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: MLFLOW_TRACKING_URI
        sync: false
      - key: MLFLOW_TRACKING_USERNAME
        sync: false
      - key: MLFLOW_TRACKING_PASSWORD
        sync: false
      - key: DAGSHUB_USER_NAME
        sync: false
      - key: DAGSHUB_REPO_NAME
        sync: false
    autoDeploy: true

  - type: web
    name: qa-frontend-staging
    runtime: node
    region: frankfurt
    plan: free
    branch: staging
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: ENVIRONMENT
        value: staging
      - key: NODE_VERSION
        value: "20"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: BACKEND_URL
        sync: false
    autoDeploy: true

  # ===========================
  # PRODUCTION ENVIRONMENT
  # ===========================
  - type: web
    name: qa-backend-prod
    runtime: python
    region: frankfurt
    plan: free
    branch: main
    buildCommand: pip install uv && uv sync && uv run python scripts/download_checkpoints.py
    startCommand: uv run uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: USE_MLFLOW
        value: "true"
      - key: MLFLOW_MODEL_NAME
        value: QA_Model
      - key: MLFLOW_MODEL_ALIAS
        value: production
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: MLFLOW_TRACKING_URI
        sync: false
      - key: MLFLOW_TRACKING_USERNAME
        sync: false
      - key: MLFLOW_TRACKING_PASSWORD
        sync: false
      - key: DAGSHUB_USER_NAME
        sync: false
      - key: DAGSHUB_REPO_NAME
        sync: false
    autoDeploy: true

  - type: web
    name: qa-frontend-prod
    runtime: node
    region: frankfurt
    plan: free
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: BACKEND_URL
        sync: false
    autoDeploy: true

  # ===========================
  # SLIDES PRESENTATION
  # ===========================
  - type: web
    name: qa-frontend-slides
    runtime: node
    region: frankfurt
    plan: free
    branch: main
    rootDir: slides
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20"
    autoDeploy: true
